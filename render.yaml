services:
  - type: web
    name: auto-trade
    env: python
    runtime: python-3.11.9
    buildCommand: |
      echo "==> Build started: $(date)"
      echo "==> Python version: $(python --version)"
      echo "==> Fixing yanked oandapyV20 version..."
      sed 's/oandapyV20==0.6.3/oandapyV20==0.7.1/' requirements.txt > requirements-deploy.txt
      echo "==> Installing with pre-built wheels only..."
      pip install --upgrade pip wheel setuptools
      pip install --only-binary=:all: --no-cache-dir -r requirements-deploy.txt
      echo "==> Build completed successfully: $(date)"
    startCommand: echo "==> Starting trading bot in production mode: $(date)" && echo "==> Environment variables check:" && env | grep -E "(ENVIRONMENT|OANDA|DATABASE)" && echo "==> Starting uvicorn..." && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --log-level info --timeout-keep-alive 60 --limit-concurrency 100 --access-log
    envVars:
      - key: PORT
        fromService:
          type: web
          name: auto-trade
          envVarKey: PORT
      - key: ENVIRONMENT
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: auto-trade-db
          property: connectionString
      - key: OANDA_ACCOUNT
        sync: false
      - key: OANDA_TOKEN
        sync: false
      - key: OANDA_ENVIRONMENT
        value: practice
      - key: ACTIVE_EXCHANGE
        value: oanda
      - key: DEFAULT_RISK_PERCENTAGE
        value: 20.0
      - key: MAX_RISK_PERCENTAGE
        value: 20.0
      - key: MAX_PORTFOLIO_HEAT
        value: 70.0
      - key: MAX_DAILY_LOSS
        value: 50.0
      - key: DB_MIN_CONNECTIONS
        value: 5
      - key: DB_MAX_CONNECTIONS
        value: 20
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: BOT_100K_DB_SCHEMA
        value: bot_100k
      - key: USE_SHARED_POSTGRES
        value: true
      - key: ENABLE_HIGH_FREQUENCY_LOGGING
        value: true
      - key: TRADE_EXECUTION_TIMEOUT
        value: 5
      - key: POSITION_SYNC_INTERVAL
        value: 30

databases:
  - name: auto-trade-db
    plan: starter
    databaseName: auto_trade
    ipAllowList: []
